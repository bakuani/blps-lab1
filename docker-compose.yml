x-elk-logging: &elk-logging
  driver: gelf
  options:
    gelf-address: "udp://127.0.0.1:12201"
    tag: "{{.Name}}"

services:
  postgres:
    image: postgres:16-alpine
    container_name: blps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: studs
      POSTGRES_USER: s413022
      POSTGRES_PASSWORD: 1i3O5V9ts2y1GN7M
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s413022 -d studs"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging: *elk-logging

  camunda-db:
    image: postgres:16-alpine
    container_name: blps-camunda-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: process-engine
      POSTGRES_USER: camunda
      POSTGRES_PASSWORD: camunda
    volumes:
      - camunda_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camunda -d process-engine"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging: *elk-logging

  camunda:
    image: camunda/camunda-bpm-platform:run-7.24.0
    container_name: blps-camunda
    restart: unless-stopped
    depends_on:
      camunda-db:
        condition: service_healthy
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://camunda-db:5432/process-engine
      DB_USERNAME: camunda
      DB_PASSWORD: camunda
      WAIT_FOR: camunda-db:5432
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:8082:8080"
    logging: *elk-logging

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: blps-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_jms_topic_exchange rabbitmq_management &&
             rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging: *elk-logging

  dolibarr-db:
    image: mariadb:11
    container_name: blps-dolibarr-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DOLI_DB_NAME:-dolidb}
      MARIADB_USER: ${DOLI_DB_USER:-dolibarr}
      MARIADB_PASSWORD: ${DOLI_DB_PASSWORD:-dolibarr}
      MARIADB_ROOT_PASSWORD: ${DOLI_DB_ROOT_PASSWORD:-root}
    volumes:
      - dolibarr_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u${DOLI_DB_USER:-dolibarr} -p${DOLI_DB_PASSWORD:-dolibarr} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging: *elk-logging

  dolibarr:
    image: dolibarr/dolibarr:latest
    container_name: blps-dolibarr
    restart: unless-stopped
    depends_on:
      dolibarr-db:
        condition: service_healthy
    environment:
      DOLI_DB_HOST: dolibarr-db
      DOLI_DB_NAME: ${DOLI_DB_NAME:-dolidb}
      DOLI_DB_USER: ${DOLI_DB_USER:-dolibarr}
      DOLI_DB_PASSWORD: ${DOLI_DB_PASSWORD:-dolibarr}
      DOLI_ADMIN_LOGIN: ${DOLI_ADMIN_LOGIN:-admin}
      DOLI_ADMIN_PASSWORD: ${DOLI_ADMIN_PASSWORD:-admin}
      DOLI_URL_ROOT: http://127.0.0.1:8081
    ports:
      - "8081:80"
    volumes:
      - dolibarr_documents:/var/www/documents
      - dolibarr_custom:/var/www/html/custom
    logging: *elk-logging

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_STACK_VERSION:-9.4.2}
    container_name: blps-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.license.self_generated.type: basic
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_STACK_VERSION:-9.4.2}
    container_name: blps-logstash
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      LS_JAVA_OPTS: ${LS_JAVA_OPTS:--Xms256m -Xmx512m}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
    ports:
      - "127.0.0.1:9600:9600"
      - "127.0.0.1:5044:5044"
      - "127.0.0.1:12201:12201/udp"
    volumes:
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - logstash_data:/usr/share/logstash/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600/_node/pipelines >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_STACK_VERSION:-9.4.2}
    container_name: blps-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_NAME: blps-kibana
      SERVER_PUBLICBASEURL: http://127.0.0.1:5601
      TELEMETRY_ENABLED: "false"
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: blps-local-encryption-key-32chars
      XPACK_REPORTING_ENCRYPTIONKEY: blps-local-reporting-key-32chars
      XPACK_SECURITY_ENCRYPTIONKEY: blps-local-security-key-32charsx
    ports:
      - "127.0.0.1:5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s

  elk-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_STACK_VERSION:-9.4.2}
    container_name: blps-elk-setup
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    user: "0"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KIBANA_URL: http://kibana:5601
    entrypoint: ["/bin/sh", "/setup/setup.sh"]
    volumes:
      - ./elk/setup:/setup:ro
      - ./elk/kibana:/kibana:ro

volumes:
  postgres_data:
  camunda_db_data:
  dolibarr_db_data:
  dolibarr_documents:
  dolibarr_custom:
  elasticsearch_data:
  logstash_data:
