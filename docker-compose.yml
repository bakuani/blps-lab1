version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: blps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./blps_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blps"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  blps_pg_data:
