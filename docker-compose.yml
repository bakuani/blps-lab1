version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: blps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: studs
      POSTGRES_USER: s413022
      POSTGRES_PASSWORD: 1i3O5V9ts2y1GN7M
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s413022 -d studs"]
      interval: 5s
      timeout: 3s
      retries: 20

  camunda-db:
    image: postgres:16-alpine
    container_name: blps-camunda-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: process-engine
      POSTGRES_USER: camunda
      POSTGRES_PASSWORD: camunda
    volumes:
      - camunda_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camunda -d process-engine"]
      interval: 5s
      timeout: 3s
      retries: 20

  camunda:
    image: camunda/camunda-bpm-platform:run-7.24.0
    container_name: blps-camunda
    restart: unless-stopped
    depends_on:
      camunda-db:
        condition: service_healthy
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://camunda-db:5432/process-engine
      DB_USERNAME: camunda
      DB_PASSWORD: camunda
      WAIT_FOR: camunda-db:5432
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:8082:8080"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: blps-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_jms_topic_exchange rabbitmq_management &&
             rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 20

  dolibarr-db:
    image: mariadb:11
    container_name: blps-dolibarr-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DOLI_DB_NAME:-dolidb}
      MARIADB_USER: ${DOLI_DB_USER:-dolibarr}
      MARIADB_PASSWORD: ${DOLI_DB_PASSWORD:-dolibarr}
      MARIADB_ROOT_PASSWORD: ${DOLI_DB_ROOT_PASSWORD:-root}
    volumes:
      - dolibarr_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u${DOLI_DB_USER:-dolibarr} -p${DOLI_DB_PASSWORD:-dolibarr} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  dolibarr:
    image: dolibarr/dolibarr:latest
    container_name: blps-dolibarr
    restart: unless-stopped
    depends_on:
      dolibarr-db:
        condition: service_healthy
    environment:
      DOLI_DB_HOST: dolibarr-db
      DOLI_DB_NAME: ${DOLI_DB_NAME:-dolidb}
      DOLI_DB_USER: ${DOLI_DB_USER:-dolibarr}
      DOLI_DB_PASSWORD: ${DOLI_DB_PASSWORD:-dolibarr}
      DOLI_ADMIN_LOGIN: ${DOLI_ADMIN_LOGIN:-admin}
      DOLI_ADMIN_PASSWORD: ${DOLI_ADMIN_PASSWORD:-admin}
      DOLI_URL_ROOT: http://127.0.0.1:8081
    ports:
      - "8081:80"
    volumes:
      - dolibarr_documents:/var/www/documents
      - dolibarr_custom:/var/www/html/custom

volumes:
  postgres_data:
  camunda_db_data:
  dolibarr_db_data:
  dolibarr_documents:
  dolibarr_custom:
