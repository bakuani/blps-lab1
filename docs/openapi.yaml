components:
  schemas:
    TariffUpsertRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        monthlyFee:
          type: number
          minimum: 0.00
        switchFee:
          type: number
          minimum: 0.00
        customizable:
          type: boolean
        pdfUrl:
          type: string
        categoryId:
          type: integer
          format: int64
      required:
      - categoryId
      - description
      - monthlyFee
      - name
      - pdfUrl
      - switchFee
    TariffResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        monthlyFee:
          type: number
        switchFee:
          type: number
        customizable:
          type: boolean
        pdfUrl:
          type: string
        categoryId:
          type: integer
          format: int64
    TariffOptionUpsertRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0.00
        tariffId:
          type: integer
          format: int64
      required:
      - description
      - name
      - price
      - tariffId
    TariffOptionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price:
          type: number
        tariffId:
          type: integer
          format: int64
    NameRequest:
      type: object
      properties:
        name:
          type: string
      required:
      - name
    IdNameResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    SubscriberUpsertRequest:
      type: object
      properties:
        phone:
          type: string
        fullName:
          type: string
        balance:
          type: number
          minimum: 0.00
        currentTariffId:
          type: integer
          format: int64
      required:
      - balance
      - fullName
      - phone
    SubscriberResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        phone:
          type: string
        fullName:
          type: string
        balance:
          type: number
        currentTariffId:
          type: integer
          format: int64
    SubscriberFeatureUpsertRequest:
      type: object
      properties:
        subscriberId:
          type: integer
          format: int64
        featureId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - ACTIVE
          - DISABLED
        connectedAt:
          type: string
          format: date-time
        disabledAt:
          type: string
          format: date-time
      required:
      - featureId
      - status
      - subscriberId
    SubscriberFeatureResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        subscriberId:
          type: integer
          format: int64
        featureId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - ACTIVE
          - DISABLED
        connectedAt:
          type: string
          format: date-time
        disabledAt:
          type: string
          format: date-time
    AdditionalFeatureUpsertRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        monthlyFee:
          type: number
          minimum: 0.00
        categoryId:
          type: integer
          format: int64
      required:
      - categoryId
      - description
      - monthlyFee
      - name
    AdditionalFeatureResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        monthlyFee:
          type: number
        categoryId:
          type: integer
          format: int64
    ChangeTariffRequest:
      type: object
      properties:
        targetTariffId:
          type: integer
          format: int64
        options:
          type: object
          additionalProperties:
            type: string
      required:
      - targetTariffId
    BillingTransactionDto:
      type: object
      properties:
        type:
          type: string
        amount:
          type: number
        description:
          type: string
        createdAt:
          type: string
          format: date-time
    ChangeTariffResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        previousTariff:
          $ref: "#/components/schemas/TariffSummaryDto"
        newTariff:
          $ref: "#/components/schemas/TariffSummaryDto"
        selectedOptions:
          type: object
          additionalProperties:
            type: string
        balance:
          type: number
        billingTransactions:
          type: array
          items:
            $ref: "#/components/schemas/BillingTransactionDto"
        notification:
          $ref: "#/components/schemas/NotificationDto"
    NotificationDto:
