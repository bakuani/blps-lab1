        name:
          type: string
        category:
          type: string
        monthlyFee:
          type: number
    DisableFeatureResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        featureId:
          type: integer
          format: int64
        billingTransactions:
          type: array
          items:
            $ref: "#/components/schemas/BillingTransactionDto"
        notification:
          $ref: "#/components/schemas/NotificationDto"
    TariffDetailsResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        category:
          type: string
        monthlyFee:
          type: number
        switchFee:
          type: number
        customizable:
          type: boolean
        pdfUrl:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/TariffOptionDto"
    TariffOptionDto:
