input {
  file {
    id => "wildfly_blps_json"
    path => ["/var/log/wildfly/blps.json"]
    mode => "tail"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb-blps-json"
    codec => json
    tags => ["wildfly", "blps"]
  }

  gelf {
    id => "docker_gelf"
    port => 12201
    use_udp => true
    use_tcp => false
    tags => ["docker"]
  }
}

filter {
  if "wildfly" in [tags] {
    mutate {
      add_field => {
        "[service][name]" => "blps"
        "[service][environment]" => "${APP_ENVIRONMENT:local}"
        "[event][dataset]" => "blps.application"
      }
      rename => {
        "[level]" => "[log][level]"
        "[loggerName]" => "[log][logger]"
        "[threadName]" => "[process][thread][name]"
        "[threadId]" => "[process][thread][id]"
        "[processId]" => "[process][pid]"
        "[processName]" => "[process][name]"
        "[hostName]" => "[host][name]"
        "[exception][exceptionType]" => "[error][type]"
        "[exception][message]" => "[error][message]"
        "[exception][frames]" => "[error][stack_trace]"
        "[stackTrace]" => "[error][stack_trace]"
      }
    }

    if [timestamp] {
      date {
        match => ["timestamp", "ISO8601"]
        target => "@timestamp"
        remove_field => ["timestamp"]
      }
    }

    if [mdc][correlation.id] {
      mutate { rename => { "[mdc][correlation.id]" => "[correlation][id]" } }
    }
    if [mdc][event.action] {
      mutate { rename => { "[mdc][event.action]" => "[event][action]" } }
    }
    if [mdc][event.category] {
      mutate { rename => { "[mdc][event.category]" => "[event][category]" } }
    }
    if [mdc][event.outcome] {
      mutate { rename => { "[mdc][event.outcome]" => "[event][outcome]" } }
    }
    if [mdc][event.duration] {
      mutate {
        rename => { "[mdc][event.duration]" => "[event][duration]" }
        convert => { "[event][duration]" => "integer" }
      }
    }
    if [mdc][user.name] {
      mutate { rename => { "[mdc][user.name]" => "[user][name]" } }
    }
    if [mdc][user.roles] {
      mutate { rename => { "[mdc][user.roles]" => "[user][roles]" } }
    }
    if [mdc][http.request.method] {
      mutate { rename => { "[mdc][http.request.method]" => "[http][request][method]" } }
    }
    if [mdc][http.response.status_code] {
      mutate {
        rename => { "[mdc][http.response.status_code]" => "[http][response][status_code]" }
        convert => { "[http][response][status_code]" => "integer" }
      }
    }
    if [mdc][url.path] {
      mutate { rename => { "[mdc][url.path]" => "[url][path]" } }
    }
    if [mdc][client.address] {
      mutate { rename => { "[mdc][client.address]" => "[client][address]" } }
    }
    if [mdc][process.key] {
      mutate { rename => { "[mdc][process.key]" => "[process][definition][key]" } }
    }
    if [mdc][process.instance.id] {
      mutate { rename => { "[mdc][process.instance.id]" => "[process][instance][id]" } }
    }
    if [mdc][process.business.key] {
      mutate { rename => { "[mdc][process.business.key]" => "[process][business][key]" } }
    }
    if [mdc][camunda.task.id] {
      mutate { rename => { "[mdc][camunda.task.id]" => "[camunda][task][id]" } }
    }
    if [mdc][camunda.topic] {
      mutate { rename => { "[mdc][camunda.topic]" => "[camunda][topic]" } }
    }
    if [mdc][business.operation] {
      mutate { rename => { "[mdc][business.operation]" => "[business][operation]" } }
    }
    if [mdc][business.request.id] {
      mutate {
        rename => { "[mdc][business.request.id]" => "[business][request][id]" }
        convert => { "[business][request][id]" => "integer" }
      }
    }
    if [mdc][subscriber.id] {
      mutate {
        rename => { "[mdc][subscriber.id]" => "[subscriber][id]" }
        convert => { "[subscriber][id]" => "integer" }
      }
    }

    mutate {
      remove_field => ["mdc", "ndc", "loggerClassName", "sequence"]
    }
  }

  if "docker" in [tags] {
    if [short_message] and ![message] {
      mutate { rename => { "[short_message]" => "[message]" } }
    } else {
      mutate { remove_field => ["short_message"] }
    }

    if [timestamp] {
      date {
        match => ["timestamp", "UNIX"]
        target => "@timestamp"
        remove_field => ["timestamp"]
      }
    }

    if [host] {
      mutate { rename => { "[host]" => "[docker_host]" } }
    }

    if [container_name] {
      mutate {
        gsub => ["container_name", "^/", ""]
        add_field => {
          "[service][name]" => "%{container_name}"
          "[container][name]" => "%{container_name}"
        }
      }
    } else {
      mutate { add_field => { "[service][name]" => "docker" } }
    }

    mutate {
      add_field => {
        "[service][environment]" => "${APP_ENVIRONMENT:local}"
        "[event][category]" => "infrastructure"
        "[event][dataset]" => "blps.infrastructure"
      }
      rename => {
        "[container_id]" => "[container][id]"
        "[image_name]" => "[container][image][name]"
        "[docker_host]" => "[host][name]"
      }
    }

    grok {
      match => {
        "message" => [
          "^.*\\b(?<parsed_log_level>LOG|NOTICE|INFO|WARNING|WARN|ERROR|FATAL|PANIC):\\s",
          "^%{TIMESTAMP_ISO8601}.*?\\b(?<parsed_log_level>LOG|NOTICE|INFO|WARNING|WARN|ERROR|FATAL|PANIC):",
          "^%{TIMESTAMP_ISO8601}.*?\\b%{LOGLEVEL:parsed_log_level}\\b",
          "^.*\\[(?<parsed_log_level>info|warning|warn|error|debug|trace)\\].*$"
        ]
      }
      tag_on_failure => []
    }

    if [parsed_log_level] {
      mutate { uppercase => ["parsed_log_level"] }
      if [parsed_log_level] == "LOG" or [parsed_log_level] == "NOTICE" or [parsed_log_level] == "INFO" {
        mutate { add_field => { "[log][level]" => "INFO" } }
      } else if [parsed_log_level] == "WARNING" or [parsed_log_level] == "WARN" {
        mutate { add_field => { "[log][level]" => "WARN" } }
      } else {
        mutate { add_field => { "[log][level]" => "%{parsed_log_level}" } }
      }
      mutate { remove_field => ["parsed_log_level"] }
    } else if [level] and [level] <= 3 {
      mutate { add_field => { "[log][level]" => "ERROR" } }
    } else if [level] and [level] == 4 {
      mutate { add_field => { "[log][level]" => "WARN" } }
    } else if [level] and [level] >= 7 {
      mutate { add_field => { "[log][level]" => "DEBUG" } }
    } else {
      mutate { add_field => { "[log][level]" => "INFO" } }
    }

    if [message] =~ / (LOG|NOTICE|INFO): / {
      mutate { replace => { "[log][level]" => "INFO" } }
    } else if [message] =~ / (WARNING|WARN): / {
      mutate { replace => { "[log][level]" => "WARN" } }
    } else if [message] =~ / (ERROR|FATAL|PANIC): / {
      mutate { replace => { "[log][level]" => "ERROR" } }
    }

    mutate {
      remove_field => [
        "command",
        "container_name",
        "created",
        "image_id",
        "level",
        "source_host",
        "version"
      ]
    }
  }

  if "_jsonparsefailure" in [tags] {
    mutate {
      add_field => {
        "[service][name]" => "logstash"
        "[service][environment]" => "${APP_ENVIRONMENT:local}"
        "[event][category]" => "pipeline"
        "[event][action]" => "json_parse_failure"
        "[event][outcome]" => "failure"
        "[log][level]" => "ERROR"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "blps-logs-%{+YYYY.MM.dd}"
    manage_template => false
    ecs_compatibility => "v8"
  }
}
